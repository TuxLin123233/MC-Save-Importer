name: 打包小林工具箱

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: 设置 Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: 安装 PyInstaller
      run: pip install pyinstaller
    
    - name: 打包成 exe
      run: |
        pyinstaller -F --add-data "data.json;." --name="小林工具箱" main.py
    
    - name: 上传 exe 文件
      uses: actions/upload-artifact@v3
      with:
        name: 小林工具箱-Windows版
        path: dist/*.exe
